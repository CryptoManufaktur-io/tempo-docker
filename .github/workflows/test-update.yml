name: Test ethd update

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env from default.env
        run: cp default.env .env

      - name: Test ethd help
        run: ./ethd help

      - name: Test check-sync help
        run: ./scripts/check_sync.sh --help

      - name: Render compose overlays
        run: docker compose --env-file default.env -f tempo.yml -f rpc-shared.yml -f ext-network.yml config

      - name: Test ethd update (debug mode)
        run: ./ethd update --debug --non-interactive

      - name: Verify .env migration worked
        run: |
          if [ ! -f .env ]; then
            echo ".env file missing after update"
            exit 1
          fi
          echo ".env file exists and migration completed"
          cat .env
