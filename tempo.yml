# =============================================================================
# Tempo Docker - Primary Compose File
# =============================================================================
# Tempo Mainnet RPC node (Reth-based, EVM-compatible L1).
# Image: ghcr.io/tempoxyz/tempo:${NODE_DOCKER_TAG}
# Source: https://docs.tempo.xyz/guide/node/rpc
# =============================================================================

services:
  download:
    image: ${NODE_DOCKER_REPO}:${NODE_DOCKER_TAG}
    container_name: ${PROJECT_NAME}-download
    profiles: [init]
    volumes:
      - ${DATA_VOLUME:-tempo-data}:/root/.local/share/reth/tempo
    entrypoint:
      - /bin/bash
      - -ec
    command:
      - >-
        tempo download --archive --datadir /root/.local/share/reth/tempo &&
        touch /root/.local/share/reth/tempo/.snapshot-restored
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  tempo:
    image: ${NODE_DOCKER_REPO}:${NODE_DOCKER_TAG}
    container_name: ${PROJECT_NAME}-node
    restart: unless-stopped
    stop_grace_period: 10m
    volumes:
      - ${DATA_VOLUME:-tempo-data}:/root/.local/share/reth/tempo
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NETWORK=${NETWORK:-mainnet}
      - CHAIN_ID=${CHAIN_ID:-4217}
    command:
      - node
      - --datadir
      - /root/.local/share/reth/tempo
      - --follow=auto
      - --http
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "${RPC_PORT:-8545}"
      - --http.api
      - eth,net,web3,txpool,trace
      - --http.corsdomain=*
      - --ws
      - --ws.addr
      - "0.0.0.0"
      - --ws.port
      - "${WS_PORT:-8546}"
      - --ws.api
      - eth,net,web3,txpool,trace
      - --ws.origins=*
      - --port
      - "${P2P_PORT:-30303}"
      - --metrics
      - "0.0.0.0:${METRICS_PORT:-9000}"
    ports:
      - ${P2P_PORT:-30303}:${P2P_PORT:-30303}/tcp
      - ${P2P_PORT:-30303}:${P2P_PORT:-30303}/udp
    labels:
      - traefik.enable=true
      - traefik.docker.network=${DOCKER_EXT_NETWORK}
      - traefik.http.routers.${RPC_HOST}.entrypoints=websecure
      - traefik.http.routers.${RPC_HOST}.rule=Host(`${RPC_HOST}.${DOMAIN}`)
      - traefik.http.routers.${RPC_HOST}.tls.certresolver=letsencrypt
      - traefik.http.routers.${RPC_HOST}.service=${RPC_LB}
      - traefik.http.routers.${RPC_HOST}lb.entrypoints=websecure
      - traefik.http.routers.${RPC_HOST}lb.rule=Host(`${RPC_LB}.${DOMAIN}`)
      - traefik.http.routers.${RPC_HOST}lb.tls.certresolver=letsencrypt
      - traefik.http.routers.${RPC_HOST}lb.service=${RPC_LB}
      - traefik.http.services.${RPC_LB}.loadbalancer.server.port=${RPC_PORT:-8545}
      - traefik.http.routers.${WS_HOST}.entrypoints=websecure
      - traefik.http.routers.${WS_HOST}.rule=Host(`${WS_HOST}.${DOMAIN}`)
      - traefik.http.routers.${WS_HOST}.tls.certresolver=letsencrypt
      - traefik.http.routers.${WS_HOST}.service=${WS_LB}
      - traefik.http.routers.${WS_HOST}lb.entrypoints=websecure
      - traefik.http.routers.${WS_HOST}lb.rule=Host(`${WS_LB}.${DOMAIN}`)
      - traefik.http.routers.${WS_HOST}lb.tls.certresolver=letsencrypt
      - traefik.http.routers.${WS_HOST}lb.service=${WS_LB}
      - traefik.http.services.${WS_LB}.loadbalancer.server.port=${WS_PORT:-8546}
      - metrics.scrape=true
      - metrics.path=/metrics
      - metrics.port=${METRICS_PORT:-9000}
      - metrics.instance=tempo
      - metrics.network=${NETWORK:-mainnet}
      - metrics.chain_id=${CHAIN_ID:-4217}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -ec 'payload="{\"jsonrpc\":\"2.0\",\"method\":\"eth_chainId\",\"params\":[],\"id\":1}";
          exec 3<>/dev/tcp/127.0.0.1/${RPC_PORT:-8545};
          printf "POST / HTTP/1.1\r\nHost: localhost\r\nContent-Type: application/json\r\nContent-Length: %s\r\nConnection: close\r\n\r\n%s"
          "$${#payload}" "$$payload" >&3;
          grep -Eq "\"result\"[[:space:]]*:[[:space:]]*\"0x1079\"" <&3'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  tempo-data:
