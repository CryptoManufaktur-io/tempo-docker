# =============================================================================
# Tempo Docker - Primary Compose File
# =============================================================================
# Tempo Mainnet RPC node (Reth-based, EVM-compatible L1).
# Image: ghcr.io/tempoxyz/tempo:${NODE_DOCKER_TAG}
# Source: https://docs.tempo.xyz/guide/node/rpc
# =============================================================================

services:
  download:
    image: ${NODE_DOCKER_REPO}:${NODE_DOCKER_TAG}
    container_name: ${PROJECT_NAME}-download
    profiles: [init]
    volumes:
      - ${DATA_DIR}:/root/.local/share/reth/tempo
    command:
      - download
      - --archive
      - --datadir
      - /root/.local/share/reth/tempo
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  tempo:
    image: ${NODE_DOCKER_REPO}:${NODE_DOCKER_TAG}
    container_name: ${PROJECT_NAME}-node
    restart: unless-stopped
    stop_grace_period: 10m
    volumes:
      - ${DATA_DIR}:/root/.local/share/reth/tempo
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NETWORK=${NETWORK:-mainnet}
    command:
      - node
      - --datadir
      - /root/.local/share/reth/tempo
      - --follow
      - --http
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "${RPC_PORT:-8545}"
      - --http.api
      - eth,net,web3,txpool,trace
      - --http.corsdomain=*
      - --ws
      - --ws.addr
      - "0.0.0.0"
      - --ws.port
      - "${WS_PORT:-8546}"
      - --ws.api
      - eth,net,web3,txpool,trace
      - --ws.origins=*
      - --metrics
      - "0.0.0.0:${METRICS_PORT:-9000}"
    ports:
      - ${P2P_PORT:-30303}:30303/tcp
      - ${P2P_PORT:-30303}:30303/udp
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/${RPC_PORT:-8545}'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
