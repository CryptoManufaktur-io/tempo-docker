# =============================================================================
# RPC Shared - Expose RPC, WS, and metrics ports on localhost
# =============================================================================
# Add :rpc-shared.yml to COMPOSE_FILE in .env to expose Tempo's HTTP/WS/metrics
# on 127.0.0.1 (handy for local smoke tests without Traefik).
# P2P (30303) is published unconditionally by tempo.yml.
# =============================================================================

services:
  tempo:
    ports:
      - "127.0.0.1:${RPC_PORT:-8545}:${RPC_PORT:-8545}"
      - "127.0.0.1:${WS_PORT:-8546}:${WS_PORT:-8546}"
      - "127.0.0.1:${METRICS_PORT:-9000}:${METRICS_PORT:-9000}"
