# =============================================================================
# Ext Network Overlay - Attach tempo to the external Traefik network
# =============================================================================
# Add :ext-network.yml to COMPOSE_FILE in .env to publish tempo via Traefik.
# Traefik labels live in tempo.yml (matches 0g-docker / cmf chainlink family).
# =============================================================================

services:
  tempo:
    networks:
      - default
      - ext-network

networks:
  ext-network:
    external: true
    name: ${DOCKER_EXT_NETWORK}
